{{- if .Values.publicIP }}
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: rops-backend-config
  namespace: {{ .Values.namespace }}
spec:
  securityPolicy:
    name: "ras-cloud-armor-policy"
  sessionAffinity: 
    affinityType: CLIENT_IP
  timeoutSec: {{ .Values.ingress.timeoutSec }}
{{- end }}
